<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Azure Boards Web</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="top-panel">
        <div class="title-wrap">
          <p class="eyebrow">Azure Boards</p>
          <h1>Backlog Jerarquico</h1>
        </div>

        <form id="controls" class="controls" autocomplete="off">
          <label class="field-group">
            <span>Nombre del backlog</span>
            <input id="backlogName" type="text" placeholder="do-arquit_gobierno-transformacion_y_modernizacion_arquitectura" />
            <div class="backlog-switch-row">
              <select id="backlogSelector" class="filter-select">
                <option value="">Seleccionar backlog...</option>
              </select>
              <button id="btnChangeBacklog" type="button" class="btn-secondary">Cambiar backlog</button>
            </div>
          </label>

          <fieldset class="field-group projects-group">
            <legend>Proyectos a visualizar</legend>
            <div id="projectSelector" class="project-selector"></div>
            <div class="project-add-row">
              <input id="newProjectId" type="text" placeholder="ID proyecto nuevo" />
              <button id="btnAddProject" type="button" class="btn-secondary">Adicionar</button>
            </div>
          </fieldset>

          <button type="submit" class="btn-primary">Cargar backlog</button>
        </form>
      </header>

      <main class="bottom-panels">
        <section class="panel details-panel">
          <h2>Detalle del Work Item</h2>

          <div id="detailActionButtons" class="detail-action-buttons is-hidden">
            <button id="btnCreateSameType" type="button" class="btn-secondary">Crear mismo tipo</button>
            <button id="btnCreateChild" type="button" class="btn-secondary">Crear por debajo</button>
          </div>

          <div class="detail-search-wrap">
            <label for="filterTextInput" class="detail-label">Filtro por ID o titulo</label>
            <input
              id="filterTextInput"
              class="detail-search-input"
              type="text"
              placeholder="Buscar por ID o titulo..."
            />
          </div>

          <div class="detail-card">
            <p class="detail-title" id="selectedWorkItemTitle">Selecciona un work item del arbol</p>
            <p class="detail-subtitle" id="selectedWorkItemMeta">Sin seleccion</p>
          </div>

          <div class="detail-fields">
            <div class="detail-field">
              <p class="detail-label">Sprint</p>
              <p class="detail-value" id="detailSprint">-</p>
              <select id="filterSprintSelect" class="filter-select">
                <option value="">Todos los sprints</option>
              </select>
            </div>

            <div class="detail-field">
              <p class="detail-label">Asignado</p>
              <p class="detail-value" id="detailAssigned">-</p>
              <select id="filterAssignedSelect" class="filter-select">
                <option value="">Todos los asignados</option>
              </select>
            </div>

            <div class="detail-field">
              <p class="detail-label">Celula ([ARQ])</p>
              <p class="detail-value" id="detailCell">-</p>
              <select id="filterCellSelect" class="filter-select">
                <option value="">Todas las celulas</option>
              </select>
            </div>
          </div>

          <button id="btnClearFilters" class="btn-ghost" type="button">Limpiar filtros</button>
        </section>

        <section class="panel tree-panel">
          <div class="tree-head">
            <h2>Jerarquia</h2>
            <p id="statusText">Cargando...</p>
          </div>
          <div class="tree-legend" id="treeLegend">
            <button class="legend-entry legend-depth-0" type="button" data-depth="0" aria-label="Contraer hasta Proyecto">
              <span class="legend-label">Proyecto</span>
              <span class="legend-count" id="legendCount0">0</span>
            </button>
            <button class="legend-entry legend-depth-1" type="button" data-depth="1" aria-label="Contraer hasta Epica">
              <span class="legend-label">Epica</span>
              <span class="legend-count" id="legendCount1">0</span>
            </button>
            <button class="legend-entry legend-depth-2" type="button" data-depth="2" aria-label="Contraer hasta Feature">
              <span class="legend-label">Feature</span>
              <span class="legend-count" id="legendCount2">0</span>
            </button>
            <button class="legend-entry legend-depth-3" type="button" data-depth="3" aria-label="Contraer hasta Tarea">
              <span class="legend-label">Tarea</span>
              <span class="legend-count" id="legendCount3">0</span>
            </button>
            <button class="legend-entry legend-depth-4" type="button" data-depth="4" aria-label="Contraer hasta Subtarea">
              <span class="legend-label">Subtarea</span>
              <span class="legend-count" id="legendCount4">0</span>
            </button>
          </div>
          <div id="treeContainer" class="tree-container"></div>
        </section>
      </main>
    </div>

    <template id="treeNodeTemplate">
      <li class="tree-node">
        <div class="node-pill"></div>
        <ul class="children"></ul>
      </li>
    </template>

    <div id="taskModal" class="modal-overlay is-hidden" role="dialog" aria-modal="true" aria-label="Crear tarea">
      <div class="modal-card">
        <div class="modal-head">
          <h3 id="taskModalTitle">Crear tarea</h3>
          <button id="btnCloseTaskModal" type="button" class="modal-close-btn">x</button>
        </div>

        <div class="modal-tabs">
          <button id="tabRawText" type="button" class="modal-tab is-active">Todo el texto</button>
          <button id="tabFieldByField" type="button" class="modal-tab">Campo a campo</button>
        </div>

        <div id="panelRawText" class="modal-panel">
          <label for="rawTaskText" class="detail-label">Texto markdown</label>
          <textarea id="rawTaskText" class="modal-textarea" placeholder="Pega el texto completo con los detalles..."></textarea>
          <div id="subtaskEstimateRawWrap" class="subtask-estimate-row is-hidden">
            <span>Dedicacion subtarea</span>
            <input id="subtaskEstimateRaw" type="number" min="0" step="0.5" value="3" />
            <span>horas</span>
          </div>
        </div>

        <div id="panelFieldByField" class="modal-panel is-hidden">
          <div class="field-grid">
            <label class="field-group-inline">
              <span>Titulo</span>
              <input id="fieldTitle" type="text" />
            </label>
            <label class="field-group-inline">
              <span>Asignado</span>
              <input id="fieldAssigned" type="text" />
            </label>
            <label class="field-group-inline">
              <span>Sprint</span>
              <input id="fieldSprint" type="text" placeholder="Sprint 3" />
            </label>
            <label class="field-group-inline">
              <span>Trimestre (tag)</span>
              <input id="fieldQuarterTag" type="text" placeholder="T3-2026" />
            </label>
            <label class="field-group-inline">
              <span>Celula (tag)</span>
              <input id="fieldCellTag" type="text" placeholder="[ARQ] Integracion" />
            </label>
            <label class="field-group-inline">
              <span>Puntos de esfuerzo</span>
              <input id="fieldEffort" type="text" />
            </label>
          </div>
          <label class="field-group-inline">
            <span>Descripcion</span>
            <textarea id="fieldDescription" class="modal-textarea short"></textarea>
          </label>
          <label class="field-group-inline">
            <span>Criterios de aceptacion</span>
            <textarea id="fieldAcceptance" class="modal-textarea short"></textarea>
          </label>
          <div id="subtaskEstimateFieldWrap" class="subtask-estimate-row is-hidden">
            <span>Dedicacion subtarea</span>
            <input id="subtaskEstimateField" type="number" min="0" step="0.5" value="3" />
            <span>horas</span>
          </div>
        </div>

        <div class="modal-actions">
          <label class="checkbox-row">
            <input id="chkCreateSubtask" type="checkbox" />
            <span>Crear subtarea con dedicacion</span>
          </label>
          <button id="btnSubmitCreateTask" type="button" class="btn-secondary detail-create-btn create-depth-3">Crear tarea</button>
        </div>
      </div>
    </div>

    <div id="resultModal" class="modal-overlay is-hidden" role="dialog" aria-modal="true" aria-label="Resultado creacion">
      <div class="modal-card small">
        <div class="modal-head">
          <h3>Work items creados</h3>
          <button id="btnCloseResultModal" type="button" class="modal-close-btn">x</button>
        </div>
        <pre id="resultContent" class="result-content"></pre>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
